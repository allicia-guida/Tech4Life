<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Tech4Life</title>
    <link rel="icon" type="image/png" href="img/t4l.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>
<body class="auth-page">

<main class="auth-card">
    <div class="auth-brand">Tech4Life</div>

    <h2>Cadastro de Usuário</h2>
    <p class="auth-text">Crie seu acesso para começar a cadastrar e consultar clientes.</p>

    <div class="auth-form">
        <input type="text" id="nome" placeholder="Nome">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <p class="auth-link-text">
        Já tem conta?
        <a href="login.html">Voltar para login</a>
    </p>
</main>

<script src="js/auth.js"></script>

</body>
</html>
