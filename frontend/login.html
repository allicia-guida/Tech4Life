<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Tech4Life</title>
    <link rel="icon" type="image/png" href="img/t4l.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<main class="auth-card">
    <div class="auth-brand">Tech4Life</div>

    <h2>Login</h2>
    <p class="auth-text">Acesse sua conta para gerenciar os cadastros de clientes.</p>

    <div class="auth-form">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="login()">Entrar</button>
    </div>

    <p class="auth-link-text">
        Ainda não tem conta?
        <a href="cadastro-usuario.html">Criar conta</a>
    </p>
</main>

<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
    new window.VLibras.Widget("https://vlibras.gov.br/app");
</script>

</body>
</html>
