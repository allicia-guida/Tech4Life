<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clientes - Tech4Life</title>
    <link rel="icon" type="image/png" href="img/t4l.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="clientes-page">

<div class="usuario-area">
    <p id="saudacaoUsuario">Olá!</p>
    <button class="btn-logout" onclick="logout()">Logout</button>
</div>

<main class="clientes-container">
    <h1>Cadastros de Clientes</h1>

    <div class="busca-area">
        <input type="text" id="campoBusca" placeholder="Buscar">
        <button id="btnBuscar"><img src="img/lupa.png" alt="lupa"></button>
    </div>

    <div class="tabela-topo">
        <button id="btnAbrirModal">Adicionar Cadastro</button>
    </div>

    <div class="table-wrapper">
        <table class="clientes-table" id="clientesTable">
            <thead class="clientes-table-head">
                <tr class="clientes-table-row clientes-table-row-head">
                    <th class="clientes-table-header">Nome</th>
                    <th class="clientes-table-header">Email</th>
                    <th class="clientes-table-header">CPF</th>
                    <th class="clientes-table-header">Telefone</th>
                    <th class="clientes-table-header">Empresa</th>
                    <th class="clientes-table-header clientes-table-header-acoes">Ações</th>
                </tr>
            </thead>

            <tbody class="clientes-table-body" id="tabelaClientes"></tbody>
        </table>
    </div>
</main>

<dialog id="modalCliente" class="cliente-modal">

    <div class="modal-content">
        <h2 id="tituloModal">Cadastro</h2>

        <input type="hidden" id="clienteId">

        <div class="modal-form">
            <input type="text" id="nomeCompleto" placeholder="Nome">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="cpf" placeholder="CPF">
            <input type="date" id="dataNascimento">
            <input type="text" id="telefone" placeholder="Telefone">
            <input type="text" id="empresa" placeholder="Empresa">
        </div>

        <div class="modal-actions">
            <button id="btnSalvar">Salvar</button>
            <button id="btnFecharModal" type="button">Fechar</button>
        </div>
    </div>

</dialog>

<script src="js/auth.js"></script>
<script src="js/script.js"></script>

</body>
</html>
