<!DOCTYPE html>
<html>
<head>
    <title>Clientes - Tech4Life</title>
</head>
<body>

<h1>Cadastros de Clientes</h1>

<button onclick="logout()">Logout</button>

<br><br>

<input type="text" id="campoBusca" placeholder="Buscar">
<button id="btnBuscar">Buscar</button>

<br><br>

<button id="btnAbrirModal">Adicionar Cadastro</button>

<br><br>

<table border="1">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Empresa</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabelaClientes"></tbody>
</table>

<dialog id="modalCliente">

    <h2 id="tituloModal">Cadastro</h2>

    <input type="hidden" id="clienteId">

    <input type="text" id="nomeCompleto" placeholder="Nome"><br><br>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="text" id="cpf" placeholder="CPF"><br><br>
    <input type="date" id="dataNascimento"><br><br>
    <input type="text" id="telefone" placeholder="Telefone"><br><br>
    <input type="text" id="empresa" placeholder="Empresa"><br><br>

    <button id="btnSalvar">Salvar</button>
    <button id="btnFecharModal">Fechar</button>

</dialog>

<script src="js/auth.js"></script>
<script src="js/script.js"></script>

</body>
</html>
